site_name: SVR4 Kernel Notes
site_description: Kernel bringup, tooling, and syscall ABI documentation for the SVR4 source tree
repo_name: classic_unix_playing/svr4-src
docs_dir: docs
use_directory_urls: false
theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Kernel Devices:
      - Driver Model: kernel-drivers.md
      - Device Catalog: kernel-device-catalog.md
      - Per-Driver Notes:
          - Overview: drivers/index.md
          - Hardware And Console:
              - Hard Disk: drivers/hd.md
              - Floppy Disk: drivers/fd.md
              - Memory Special Files: drivers/mem.md
              - CMOS RAM: drivers/cram.md
              - Serial: drivers/asy.md
              - Line Printer: drivers/lp.md
              - Real-Time Clock: drivers/rtc.md
              - Keyboard Display: drivers/kd.md
              - KD Video Mapper: drivers/kdvm.md
              - Generic Video: drivers/gvid.md
          - Pseudo Devices And Plumbing:
              - Clone STREAMS: drivers/clone.md
              - Channel Multiplexer: drivers/cmux.md
              - Kernel Profiler: drivers/prf.md
              - STREAMS Log: drivers/log.md
              - PTY Master: drivers/ptm.md
              - PTY Slave: drivers/pts.md
              - XT Protocol: drivers/xt.md
              - SXT Shell Layers: drivers/sxt.md
              - Generic TTY: drivers/gentty.md
              - OS Messages: drivers/osm.md
              - System Messages: drivers/sysmsg.md
              - STREAMS Admin: drivers/sad.md
              - NXT Terminal: drivers/nxt.md
              - NSXT Multiplexor: drivers/nsxt.md
          - STREAMS Modules:
              - ANSI: drivers/ansi.md
              - Char Translation: drivers/char.md
              - Connld: drivers/connld.md
              - Ldterm: drivers/ldterm.md
              - Pipemod: drivers/pipemod.md
              - Ttcompat: drivers/ttcompat.md
          - Network And TLI Endpoints:
              - ARP: drivers/arp.md
              - ICMP: drivers/icmp.md
              - IP: drivers/ip.md
              - LLC Loopback: drivers/llcloop.md
              - Raw IP: drivers/rawip.md
              - TCP: drivers/tcp.md
              - UDP: drivers/udp.md
              - TICLTS: drivers/ticlts.md
              - TICOTS: drivers/ticots.md
              - TICOTSOR: drivers/ticotsor.md
  - Syscalls:
      - Reference: syscalls.md
      - Porting Guide: syscall-porting-guide.md
      - Multiplexed Families: syscall-families.md
  - Bringup:
      - Boot Floppy Tooling: boot-floppy-tooling.md
      - Bringup Debug Notes: bringup-debug-notes-2026-05-06.md