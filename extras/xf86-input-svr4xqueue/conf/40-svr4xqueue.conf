# SVR4 Xqueue input devices.
#
# A single shared kernel event queue carries both keyboard and mouse events,
# so this driver is instantiated twice: once as a keyboard and once as a
# pointer. Both open the same workstation device (/dev/kd/kdvm00 by default).
#
# There is no udev/hotplug on this system, so the devices are declared
# explicitly here and referenced from the "SVR4WS Layout" ServerLayout defined
# in 10-svr4ws.conf (xf86-video-svr4ws). The "DeviceClass" option selects which
# half of the queue each instance drives.

Section "InputDevice"
    Identifier "SVR4XQ Keyboard"
    Driver "svr4xqueue"
    Option "DeviceClass" "keyboard"
    Option "Device" "/dev/kd/kdvm00"
EndSection

Section "InputDevice"
    Identifier "SVR4XQ Pointer"
    Driver "svr4xqueue"
    Option "DeviceClass" "pointer"
    Option "Device" "/dev/kd/kdvm00"
    Option "VT" "/dev/vt00"
EndSection
