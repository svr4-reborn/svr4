Section "Device"
    Identifier "SVR4WS Device"
    Driver "svr4ws"
    Option "Device" "/dev/kd/kdvm00"
    Option "VT" "/dev/vt00"
    Option "Mode" "vdc800x600e"
EndSection

Section "Monitor"
    Identifier "SVR4WS Monitor"
EndSection

Section "Screen"
    Identifier "SVR4WS Screen"
    Device "SVR4WS Device"
    Monitor "SVR4WS Monitor"
    DefaultDepth 8
    SubSection "Display"
        Depth 8
        Modes "800x600"
        Virtual 800 600
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "SVR4WS Layout"
    Screen "SVR4WS Screen"
    # Input devices are defined in 40-svr4xqueue.conf (xf86-input-svr4xqueue).
    InputDevice "SVR4XQ Keyboard" "CoreKeyboard"
    InputDevice "SVR4XQ Pointer" "CorePointer"
EndSection